<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="22" fill="#0E0F6F"/>
  <defs>
    <linearGradient id="lg_top" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="50%" stop-color="#FF4466"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <linearGradient id="lg_left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8800"/>
      <stop offset="100%" stop-color="#FF1155"/>
    </linearGradient>
    <linearGradient id="lg_right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF00EE"/>
      <stop offset="100%" stop-color="#CC0044"/>
    </linearGradient>
  </defs>
  <!-- 3D box/heart top face -->
  <polygon points="50,18 72,30 50,42 28,30" fill="url(#lg_top)"/>
  <!-- Left face -->
  <polygon points="28,30 50,42 50,68 28,56" fill="url(#lg_left)"/>
  <!-- Right face -->
  <polygon points="72,30 50,42 50,68 72,56" fill="url(#lg_right)"/>
  <!-- Laz text -->
  <text x="50" y="90" font-family="Arial Black,sans-serif" font-size="14" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="1">Laz</text>
</svg>
