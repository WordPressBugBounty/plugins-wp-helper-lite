<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="robotB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="faceB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <radialGradient id="eyeB" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <filter id="glowB" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowB">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- BG circle -->
  <circle cx="200" cy="200" r="192" fill="url(#bgB)"/>

  <!-- Outer ring dashed -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="24"
          stroke-dasharray="18 10"/>
  <circle cx="200" cy="200" r="170" fill="rgba(0,0,0,0.15)"/>

  <!-- Neural network bg nodes -->
  <g opacity="0.2">
    <circle cx="55"  cy="160" r="5"  fill="#a78bfa"/>
    <circle cx="345" cy="160" r="5"  fill="#a78bfa"/>
    <circle cx="55"  cy="240" r="4"  fill="#a78bfa"/>
    <circle cx="345" cy="240" r="4"  fill="#a78bfa"/>
    <circle cx="85"  cy="110" r="3"  fill="#a78bfa"/>
    <circle cx="315" cy="110" r="3"  fill="#a78bfa"/>
    <line x1="55"  y1="160" x2="85"  y2="110" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="345" y1="160" x2="315" y2="110" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="55"  y1="160" x2="55"  y2="240" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="345" y1="160" x2="345" y2="240" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="85"  y1="110" x2="130" y2="85"  stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="315" y1="110" x2="270" y2="85"  stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="130" cy="85"  r="3" fill="#a78bfa"/>
    <circle cx="270" cy="85"  r="3" fill="#a78bfa"/>
  </g>

  <!-- Antenna -->
  <line x1="200" y1="108" x2="200" y2="72" stroke="#c4b5fd" stroke-width="5" stroke-linecap="round"/>
  <circle cx="200" cy="63" r="14" fill="#a78bfa" filter="url(#glowB)"/>
  <circle cx="200" cy="63" r="6"  fill="#ffffff"/>

  <!-- HEAD outer -->
  <rect x="125" y="108" width="150" height="112" rx="22" fill="url(#robotB)" filter="url(#shadowB)"/>
  <!-- HEAD face panel -->
  <rect x="135" y="118" width="130" height="92"  rx="16" fill="url(#faceB)"/>

  <!-- Eye sockets -->
  <circle cx="168" cy="154" r="22" fill="#1e1b4b"/>
  <circle cx="232" cy="154" r="22" fill="#1e1b4b"/>
  <!-- Eyes -->
  <circle cx="168" cy="154" r="15" fill="url(#eyeB)" filter="url(#glowB)"/>
  <circle cx="232" cy="154" r="15" fill="url(#eyeB)" filter="url(#glowB)"/>
  <circle cx="168" cy="154" r="5"  fill="#fff"/>
  <circle cx="232" cy="154" r="5"  fill="#fff"/>

  <!-- Eyebrow accents -->
  <rect x="154" y="128" width="28" height="5" rx="3" fill="#4f46e5" opacity="0.6"/>
  <rect x="218" y="128" width="28" height="5" rx="3" fill="#4f46e5" opacity="0.6"/>

  <!-- Smile -->
  <path d="M162,184 Q200,198 238,184" fill="none" stroke="#4f46e5" stroke-width="4"
        stroke-linecap="round" opacity="0.7"/>

  <!-- Neck -->
  <rect x="184" y="220" width="32" height="16" rx="5" fill="#2563eb"/>

  <!-- BODY -->
  <rect x="112" y="236" width="176" height="108" rx="20" fill="url(#robotB)" filter="url(#shadowB)"/>

  <!-- Chest panel -->
  <rect x="133" y="252" width="134" height="72" rx="12" fill="#1e1b4b" opacity="0.7"/>

  <!-- Gear mini inside chest -->
  <circle cx="200" cy="281" r="24" fill="none" stroke="#818cf8" stroke-width="3" stroke-dasharray="8 4"/>
  <circle cx="200" cy="281" r="14" fill="#312e81"/>
  <!-- Wrench mini -->
  <g transform="translate(200,281)">
    <rect x="-3" y="-14" width="6" height="18" rx="2" fill="#a78bfa"/>
    <path d="M-7,-14 Q0,-22 7,-14" fill="none" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- AI badge -->
  <rect x="218" y="265" width="30" height="16" rx="8" fill="#a78bfa" filter="url(#glowB)"/>
  <text x="233" y="277" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
        font-size="10" font-weight="900" fill="#fff">AI</text>

  <!-- Left arm -->
  <rect x="65" y="236" width="47" height="90" rx="14" fill="url(#robotB)"/>
  <!-- Wrench left arm -->
  <g transform="translate(89,306) rotate(-30)">
    <rect x="-4" y="-20" width="8" height="24" rx="3" fill="#fbbf24"/>
    <path d="M-8,-20 Q0,-32 8,-20" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
    <path d="M-4,4  Q0,10 4,4"    fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Right arm -->
  <rect x="288" y="236" width="47" height="90" rx="14" fill="url(#robotB)"/>
  <!-- Circuit chip right arm -->
  <g transform="translate(311,290)" filter="url(#glowB)" opacity="0.9">
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="#a78bfa"/>
    <line x1="-12" y1="-5" x2="-17" y2="-5" stroke="#a78bfa" stroke-width="2"/>
    <line x1="-12" y1="5"  x2="-17" y2="5"  stroke="#a78bfa" stroke-width="2"/>
    <line x1="12"  y1="-5" x2="17"  y2="-5" stroke="#a78bfa" stroke-width="2"/>
    <line x1="12"  y1="5"  x2="17"  y2="5"  stroke="#a78bfa" stroke-width="2"/>
  </g>

  <!-- Legs -->
  <rect x="148" y="344" width="46" height="34" rx="10" fill="url(#robotB)"/>
  <rect x="136" y="370" width="62" height="14" rx="7" fill="#1d4ed8"/>
  <rect x="206" y="344" width="46" height="34" rx="10" fill="url(#robotB)"/>
  <rect x="202" y="370" width="62" height="14" rx="7" fill="#1d4ed8"/>
</svg>
